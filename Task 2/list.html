<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Unordered list</h2>
    <ul>
        <li>Dosa</li>
        <li>Pav bhaji</li>
        <li>Biryani</li>
    </ul>
    <hr>
    <h2>Ordered list</h2>
    <ol>
        <li>wake up</li>
        <li>exercise</li>
        <li>attend college</li>
    </ol>
    <hr>
    <h2>Nested list</h2>
    <ol>
        <li>English</li>
        <ul>
            <li>Grammar</li>
            <li>Writing skills</li>
        </ul>
        <li>Maths</li>
        <ul>
            <li>Discrete mathematics</li>
            <li>Calculus</li>
        </ul>
    </ol>
</body>
</html>
